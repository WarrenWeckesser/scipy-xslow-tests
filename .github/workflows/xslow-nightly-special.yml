# Do not edit this file.  To update the files named xslow-nightly-MODULE.yml,
# update xslow-nightly.template and run generate.py.

name: scipy.special, scipy nightly

on: workflow_dispatch

jobs:

  xslow-special:
    strategy:
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Update pip
        run: |
          python -m pip install --upgrade pip
      - name: Install numpy, pytest, etc.
        run: |
          python -m pip install numpy pytest pytest-cov pytest-timeout mpmath gmpy2 threadpoolctl hypothesis array-api-strict
      - name: Install nightly scipy
        run: |
          python -m pip install --pre --upgrade --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple scipy
      - name: Test scipy.special
        run: |
          SCIPY_XSLOW=1 python3 -c "import scipy; scipy.special.test('full')"
