name: scipy.interpolate, scipy nightly

on: workflow_dispatch

jobs:

  xslow-interpolate:
    strategy:
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Update pip
        run: |
          python -m pip install --upgrade pip
      - name: Install nightly scipy
        run: |
          python -m pip install --pre --upgrade --extra-index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple scipy
      - name: Test scipy.interpolate
        run: |
          SCIPY_XSLOW=1 python3 -c "import scipy; scipy.interpolate.test('full')
