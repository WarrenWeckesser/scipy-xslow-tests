# template file and run generate.py.

name: scipy.differentiate, scipy nightly

on: workflow_dispatch

jobs:

  xslow-differentiate:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    env:
      SCIPY_XSLOW: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Update pip
        run: |
          python -m pip install --upgrade pip
      - name: Install numpy, pytest, etc.
        run: |
          python -m pip install numpy pytest pytest-xdist pytest-timeout mpmath gmpy2 threadpoolctl hypothesis array-api-strict
      - name: Install nightly scipy
        run: |
          python -m pip install --pre --upgrade --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple scipy
      - name: Run scipy.show_config()
        run: |
          python -c "import scipy; scipy.show_config()"
      - name: Test scipy.differentiate
        run: |
          pytest -n 2 --pyargs scipy.differentiate --durations 15
