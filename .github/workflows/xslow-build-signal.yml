# template file and run generate.py.

name: scipy.signal, scipy build

on: workflow_dispatch

jobs:

  xslow-signal:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    env:
      SCIPY_XSLOW: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Update python pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      - name: Install libopenblas-dev
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install libopenblas-dev
      - name: Clone the scipy repo
        run: |
          git clone --shallow-submodules --recurse-submodules https://github.com/scipy/scipy.git
      - name: Install Python dependencies
        run: |
          cd scipy
          pwd
          python -m pip install --group build --group test --group dev-cli
      - name: Test scipy.signal with spin
        run: |
          cd scipy
          pwd
          spin test -m full -j 2 -s signal --durations 10
