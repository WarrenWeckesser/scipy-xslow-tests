name: scipy nightly, xslow tests

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'SciPy module to test'
        required: true
        type: choice
        options:
          - cluster
          - differentiate
          - fft
          - integrate
          - interpolate
          - linalg
          - optimize
          - signal
          - sparse
          - spatial
          - special
          - stats

jobs:

  xslow-test:
    name: xslow-test ${{ inputs.module }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    env:
      SCIPY_XSLOW: 1

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Update pip
        run: |
          python -m pip install --upgrade pip
      - name: Install numpy, pytest, etc.
        run: |
          python -m pip install numpy pytest pytest-xdist pytest-timeout mpmath gmpy2 threadpoolctl hypothesis array-api-strict pyyaml
      - name: Install nightly scipy
        run: |
          python -m pip install --pre --upgrade --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple scipy
      - name: Run scipy.show_config()
        run: |
          python -c "import scipy; print(scipy.__version__); scipy.show_config()"
      - name: Test ${{ inputs.module }}
        run: |
          pytest -n 2 --pyargs scipy.${{ inputs.module }} --durations 15
