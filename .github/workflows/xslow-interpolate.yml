name: Run the XSLOW tests for scipy.interpolate

on: workflow_dispatch

jobs:

  xslow-interpolate:
    strategy:
      matrix:
        python-version: ['3.14']
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install platform libopenblas
        run: |
          sudo apt-get install libopenblas-dev
      - name: Update python pip, wheel, setuptools
        run: |
          python -m pip install --upgrade pip wheel setuptools
      - name: Clone the scipy repo
        run: |
          cd ..
          git clone --shallow-submodules --recurse-submodules https://github.com/scipy/scipy.git
          cd scipy
      - name: Install build, dev and test requirements
        run: |
          python -m pip install -r requirements/build.txt
          python -m pip install -r requirements/dev.txt
          python -m pip install -r requirements/test.txt
      - name: Build scipy
        run: |
          python -m pip install . --no-build-isolation
      - name: Test scipy.interpolate
        run: |
          pwd
          SCIPY_XSLOW=1 spin test -m full -j 2 -s interpolate --durations 10
